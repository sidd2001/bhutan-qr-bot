# Railway uses Nixpacks to build. This tells it to install Chromium dependencies
# so Puppeteer can run the browser.

[phases.setup]
nixPkgs = ['nodejs_20', 'chromium']

[phases.install]
cmds = ['npm install']

[phases.build]
cmds = ['npx puppeteer browsers install chrome']

[start]
cmd = 'node -r dotenv/config src/bot.js'

[variables]
PUPPETEER_EXECUTABLE_PATH = '/nix/var/nix/profiles/default/bin/chromium'
